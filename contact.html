  <div class="center">
    <h1 class="page-title">Contact</h1>
    <p class="page-subtitle">Send a message</p>
  </div>

  <!--
    This form works on Netlify (free tier) with no backend:
    1) Deploy to Netlify
    2) Ensure this exact HTML is present at build time
    3) Netlify will capture submissions automatically

    If you host on GitHub Pages, you can switch to:
    - Formspree (free tier), or
    - A simple email link
  -->
  <form class="form" name="contact" method="POST" data-netlify="true">
    <input type="hidden" name="form-name" value="contact" />
    <div class="field">
      <label for="name">Your name</label>
      <input id="name" name="name" autocomplete="name" required />
    </div>
    <div class="field">
      <label for="email">Your email address</label>
      <input id="email" name="email" type="email" autocomplete="email" required />
    </div>
    <div class="field">
      <label for="message">Your message</label>
      <textarea id="message" name="message" required></textarea>
    </div>
    <button class="btn" type="submit">Submit</button>
  </form>
</main>
